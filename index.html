// ============ INIT ============
(function(){
  try{const s=localStorage.getItem('mtproxy_lang');if(s&&T[s])lang=s;}catch(e){}
  const h=location.hash.replace('#','');
  if(['home','howto','about','pwa','contacts'].includes(h))currentView=h;
  render();
})();

// ============ NAVIGATION ============
function navigate(v){currentView=v;location.hash=v==='home'?'':v;closeMobile();render();window.scrollTo(0,0);}
function toggleMobile(){document.getElementById('mobileMenu').classList.toggle('open');}
function closeMobile(){document.getElementById('mobileMenu').classList.remove('open');}

// ============ PUBLIC PROXIES ============
const PUB_URL='https://raw.githubusercontent.com/nellimonix/mtproxy_list/refs/heads/main/mtproxy.json';

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function togglePublicProxies(){
  const el=document.getElementById('pubSpoiler');
  el.classList.toggle('open');
  if(el.classList.contains('open')&&!pubLoaded&&!pubLoading)loadPublicProxies();
}

function loadPublicProxies(){
  const t=T[lang];
  const body=document.getElementById('pubBody');
  pubLoading=true;
  body.innerHTML='<div class="pub-spoiler-loader"><div class="pub-spinner"></div><span>'+esc(t.pub.loading)+'</span></div>';

  fetch(PUB_URL)
    .then(r=>r.json())
    .then(data=>{
      pubProxies=shuffle(data.map(p=>({geo:p.country,server:p.host,port:p.port,secret:p.secret})));
      pubLoaded=true;
      pubLoading=false;
      const cnt=document.getElementById('pubCount');
      cnt.textContent=pubProxies.length;
      cnt.style.display='';
      renderPublicGrid();
    })
    .catch(()=>{
      pubLoading=false;
      body.innerHTML='<div style="text-align:center;padding:24px 0;color:#5b6b7b;font-size:14px">'+esc(t.pub.error)+'</div>';
    });
}

function renderPublicGrid(){
  const t=T[lang];
  const body=document.getElementById('pubBody');
  body.innerHTML='<div class="proxy-grid">'+pubProxies.map(p=>
    '<div class="proxy-card"><div class="proxy-info"><div class="proxy-flag">'+flagImg(p.geo)+'</div><div class="proxy-meta"><div class="proxy-name" title="'+esc(p.server)+'">'+esc(p.server)+'</div><div class="proxy-details"><span class="proxy-tag">'+esc(p.geo)+'</span><span class="proxy-tag">:'+p.port+'</span></div></div></div><a href="tg://proxy?server='+esc(p.server)+'&port='+p.port+'&secret='+esc(p.secret)+'" class="btn-connect">'+esc(t.proxies.connect)+'</a></div>'
  ).join('')+'</div>';
}

// ============ RENDER ============
function render(){
  const t=T[lang];
  const isRTL=lang==='ir';
  document.documentElement.lang=isRTL?'fa':lang;
  document.documentElement.dir=isRTL?'rtl':'ltr';

  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const el=document.getElementById('view-'+currentView);
  if(el)el.classList.add('active');

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    const val=key.split('.').reduce((o,k)=>o&&o[k],t);
    if(val)el.textContent=val;
  });

  const navKeys=['home','howto','about','pwa','contacts'];
  const langBtns='<div class="lang-switch">'+['ru','en','ir'].map(l=>'<button class="lang-btn'+(lang===l?' active':'')+'" onclick="setLang(\''+l+'\')">'+l.toUpperCase()+'</button>').join('')+'</div>';

  document.getElementById('desktopNav').innerHTML=navKeys.map(k=>'<a href="#'+(k==='home'?'':k)+'" class="nav-link'+(currentView===k?' active':'')+'" onclick="navigate(\''+k+'\');return false">'+t.nav[k]+'</a>').join('')+langBtns;

  const mobile=document.getElementById('mobileMenu');
  mobile.innerHTML=navKeys.map(k=>'<a href="#'+(k==='home'?'':k)+'" class="nav-link'+(currentView===k?' active':'')+'" onclick="navigate(\''+k+'\');return false">'+t.nav[k]+'</a>').join('')+'<div class="lang-switch" style="margin:16px 0 0;justify-content:center">'+['ru','en','ir'].map(l=>'<button class="lang-btn'+(lang===l?' active':'')+'" onclick="setLang(\''+l+'\')">'+l.toUpperCase()+'</button>').join('')+'</div>';

  document.getElementById('footerLinks').innerHTML=navKeys.map(k=>'<a href="#'+(k==='home'?'':k)+'" onclick="navigate(\''+k+'\');return false">'+t.nav[k]+'</a>').join('');

  renderProxies();
  if(pubLoaded)renderPublicGrid();
  renderFAQ();renderHowto();renderAbout();renderPWA();renderSEO();
}

}
